<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="dns-prefetch" href="https://www.googleapis.com">
    <link rel="dns-prefetch" href="https://img.youtube.com">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#050a15">
    <meta name="description" content="Database Lengkap Script Bot WhatsApp Gratis - AwangXoffc ID">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Plus+Jakarta+Sans:wght@300;400;600;800;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignal.js" async=""></script>
    
    <script src="config.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="stylesc.css"> </head>
<body oncontextmenu="return false;">

    <div id="toastContainer" class="toast-container"></div>

    <audio id="sound-pop" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>
    <audio id="sound-success" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>

    <div id="lightbox" onclick="closeLightbox()">
        <img id="lightboxImg" class="lightbox-content" src="" alt="Preview">
        <div class="absolute top-6 right-6 text-white text-3xl cursor-pointer hover:text-blue-400 transition-colors drop-shadow-lg">
            <i class="fas fa-times"></i>
        </div>
    </div>

    <div id="loader-wrapper">
        <div class="loader-logo">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2 17L12 22L22 17" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2 12L12 17L22 12" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <div class="loader-bar-container">
            <div id="loader-bar-fill"></div>
        </div>
    </div>

    <div id="customBg" class="main-bg-fixed"></div>
    <div class="main-bg-overlay"></div>
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="app-container" style="max-width: 1000px; margin: 0 auto;">
        
        <aside id="sidebar">
            <div class="p-8 flex flex-col items-center border-b border-blue-500/20">
                <div class="relative group cursor-pointer">
                    <img src="" id="sidebarAvatar" class="w-20 h-20 rounded-full border-2 border-blue-500 p-1 object-cover shadow-[0_0_20px_rgba(59,130,246,0.5)] transition-transform group-hover:scale-105" alt="Admin">
                    <div class="absolute inset-0 rounded-full border border-blue-500/50 animate-ping opacity-20"></div>
                </div>
                <span class="pixel-font text-[10px] text-blue-400 mt-4 uppercase tracking-widest text-shadow-glow">Command Center</span>
            </div>
            <div id="sidebarContent" class="py-6 overflow-y-auto h-[calc(100vh-180px)] custom-scrollbar"></div>
        </aside>

        <main class="pb-10 min-h-screen flex flex-col">
            
            <nav class="p-6 flex justify-between items-center sticky top-0 z-50 transition-all" style="background: rgba(5, 10, 21, 0.95); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(59,130,246,0.2);">
                <button onclick="toggleMenu(); playSfx('pop')" class="w-10 h-10 flex items-center justify-center bg-blue-600/10 rounded-xl text-blue-400 border-t border-white/10 border-b-2 border-black/50 active:scale-95 transition-transform hover:bg-blue-600/20">
                    <i class="fas fa-bars-staggered"></i>
                </button>
                
                <div class="glass-card px-5 py-2 rounded-full">
                    <div id="navBrand" class="text-blue-400 text-[11px] font-black uppercase tracking-widest">LOADING...</div>
                </div>
                
                <a href="index.html" onclick="playSfx('pop')" class="w-10 h-10 flex items-center justify-center bg-blue-600/10 rounded-xl text-blue-400 border-t border-white/10 border-b-2 border-black/50 active:scale-95 transition-transform hover:bg-blue-600/20">
                    <i class="fas fa-home"></i>
                </a>
            </nav>

            <div class="mt-8 px-6 flex-1">
                
                <h1 class="sc-page-title">ALL PREMIUM SCRIPTS</h1>
                
                <div class="relative mb-10 group max-w-xl mx-auto sc-search-wrapper">
                    <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-blue-500 z-10 text-sm transition-colors group-hover:text-blue-400"></i>
                    <input type="text" id="scriptSearch" 
                           class="w-full bg-[#111a2e] rounded-2xl py-4 pl-14 pr-4 text-sm outline-none text-white placeholder-gray-500 transition-all font-medium border border-blue-500/20 focus:border-blue-500 focus:shadow-[0_0_20px_rgba(59,130,246,0.2)]" 
                           placeholder="Cari script bot..." 
                           onkeyup="filterScripts()">
                </div>
                
                <div id="scriptList" class="script-grid-view">
                    <div class="skeleton-card skeleton"></div>
                    <div class="skeleton-card skeleton"></div>
                    <div class="skeleton-card skeleton"></div>
                    <div class="skeleton-card skeleton"></div>
                </div>
                
                <div id="scrollDots" class="scroll-dots"></div>
            </div>

            <footer id="mainFooter" class="mt-20 border-t border-white/5 bg-[#0a1120]/90 backdrop-blur-xl pt-16 pb-12"></footer>
        </main>
    </div>

    <div id="footerPageModal" class="f-modal">
        <div class="f-modal-content">
            <h2 id="fPageTitle" class="pixel-font text-blue-400 text-xs mb-6 uppercase">Title</h2>
            <div id="fPageContent" class="text-gray-400 text-xs leading-relaxed max-h-[60vh] overflow-y-auto pr-2 custom-scrollbar"></div>
            <button onclick="closeFooterModal(); playSfx('pop')" class="w-full mt-8 py-4 bg-white/5 border border-white/10 rounded-2xl text-[10px] font-black uppercase tracking-widest text-white hover:bg-white/10 transition-colors btn-3d">
                Tutup
            </button>
        </div>
    </div>

    <div id="revModal" class="fixed inset-0 bg-black/95 z-[2000] hidden flex items-center justify-center p-6 backdrop-blur-2xl">
        <div class="bg-[#0d1425] w-full max-sm rounded-[2.5rem] p-8 border border-blue-500/30 shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-600 to-purple-600"></div>
            <h3 id="modalTitle" class="text-xl font-black text-center mb-6 uppercase text-white tracking-wide">Kirim Ulasan</h3>
            
            <input type="text" id="hp_user_check" class="hp-field" tabindex="-1" autocomplete="off">
            <div class="flex justify-center gap-2 text-3xl mb-6" id="starInput">
                <span class="cursor-pointer text-gray-800" data-v="1">★</span>
                <span class="cursor-pointer text-gray-800" data-v="2">★</span>
                <span class="cursor-pointer text-gray-800" data-v="3">★</span>
                <span class="cursor-pointer text-gray-800" data-v="4">★</span>
                <span class="cursor-pointer text-gray-800" data-v="5">★</span>
            </div>
            
            <input id="revName" type="text" placeholder="Nama" class="w-full bg-[#16213e] p-4 rounded-xl mb-4 text-sm text-white">
            
            <div id="profilePreviewContainer" style="display:none;">
                <img id="profilePreviewImg" src="">
                <div id="removeProfilePreviewBtn" onclick="clearProfileSelection()">x</div>
            </div>
            <input type="file" id="revProfileFile" class="hidden">

            <textarea id="revText" placeholder="Pesan..." class="w-full bg-[#16213e] p-4 rounded-xl h-32 mb-4 text-sm text-white"></textarea>
            
            <div id="imagePreviewContainer" style="display:none;">
                <img id="imagePreviewImg" src="">
                <div id="removePreviewBtn" onclick="clearImageSelection()">x</div>
            </div>
            <input type="file" id="revFile" class="hidden">
            
            <div class="flex gap-4">
                <button onclick="closeModal()" class="flex-1 text-gray-400 font-bold uppercase text-[10px] bg-white/5 py-4 rounded-xl border border-white/10 btn-3d">Tutup</button>
                <button id="submitReviewBtn" onclick="postReview()" class="flex-1 bg-blue-600 rounded-xl py-4 font-black text-white uppercase text-[10px] btn-3d">Kirim</button>
            </div>
        </div>
    </div>

    <script src="utils.js"></script>
    <script type="module" src="awang1.js"></script>
    <script type="module" src="awang2.js"></script>
    <script type="module" src="script_sc.js"></script> 
    <script src="main.js"></script>

</body>
</html>

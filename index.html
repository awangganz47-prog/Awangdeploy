            document.getElementById('bigRating').innerText = avg;
            document.getElementById('reviewCountText').innerText = `${comms.length} REVIEWS`;
            renderRatingBars(comms);
            renderComments();
            renderPopuler();
            renderScripts(CONFIG.items);
        };

        function renderRatingBars(comms) {
            const container = document.getElementById('ratingBarsContainer');
            const total = comms.length || 1;
            let html = '';
            for(let i=5; i>=1; i--) {
                const count = comms.filter(c => c.star === i).length;
                const perc = (count / total) * 100;
                html += `<div class="flex items-center gap-3"><span class="text-[10px] font-bold w-2">${i}</span><div class="rating-bar-bg"><div class="rating-bar-fill" style="width: ${perc}%"></div></div></div>`;
            }
            container.innerHTML = html;
        }

        window.togglePagination = () => {
            const mainComments = (siteData.comments || []).filter(c => !c.parentId);
            const remaining = mainComments.length - visibleCount;
            if (remaining > 0) {
                const increment = Math.max(5, Math.ceil(remaining / 2));
                visibleCount += increment;
            }
            renderComments();
            playSfx('pop');
        };

        window.resetPagination = () => {
            visibleCount = 10;
            renderComments();
            playSfx('pop');
            document.getElementById('reviewCountText').scrollIntoView({ behavior: 'smooth' });
        };

        window.toggleCommentMenu = (id) => {
            const allMenus = document.querySelectorAll('.dropdown-menu');
            const targetMenu = document.getElementById(`menu-${id}`);
            const isActive = targetMenu.classList.contains('active');
            allMenus.forEach(m => m.classList.remove('active'));
            if (!isActive) targetMenu.classList.add('active');
            playSfx('pop');
        };

        window.addEventListener('click', (e) => {
            if (!e.target.closest('.comment-menu-container')) {
                document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('active'));
            }
        });

        window.copyMyUID = () => {
            const uid = localStorage.getItem('user_uid_v4');
            navigator.clipboard.writeText(uid).then(() => {
                Swal.fire({
                    title: 'UID Disalin!',
                    text: uid,
                    icon: 'success',
                    background: '#0d1425',
                    color: '#fff'
                });
            });
        };

        window.renderComments = function() {
            const container = document.getElementById('commentList');
            const paginationContainer = document.getElementById('showAllContainer');
            const hideBtn = document.getElementById('hideCommentsBtn');
            const data = siteData.comments || [];
            const isViewerAdmin = (USER_UID === ADMIN_UID);
            
            const allSorted = [...data].sort((a, b) => new Date(b.timestamp).getTime() - new Date(a.timestamp).getTime());
            const mainComments = allSorted.filter(c => !c.parentId);
            
            if (mainComments.length > 10) {
                paginationContainer.classList.remove('hidden');
                if (visibleCount >= mainComments.length) {
                    document.getElementById('toggleCommentsBtn').classList.add('hidden');
                    hideBtn.classList.remove('hidden');
                } else {
                    document.getElementById('toggleCommentsBtn').classList.remove('hidden');
                    hideBtn.classList.add('hidden');
                }
            } else {
                paginationContainer.classList.add('hidden');
            }

            const displayedMains = mainComments.slice(0, visibleCount);
            const myInteractions = JSON.parse(localStorage.getItem('my_ints_v4') || '{}');

            container.innerHTML = displayedMains.map(c => {
                const isCommentDeveloper = (c.uid === ADMIN_UID);
                const isMyComment = (c.uid === USER_UID);
                const userInt = myInteractions[c.id]; 
                const relevantReps = data.filter(r => r.parentId === c.id).sort((a,b) => new Date(a.timestamp).getTime() - new Date(b.timestamp).getTime());

                let stars = '';
                for(let i=1; i<=5; i++) stars += `<i class="fas fa-star text-[8px] ${i <= (c.star || 0) ? 'star-active' : 'star-inactive'}"></i>`;

                return `
                <div class="comment-wrapper" id="comment-${c.id}">
                    <div class="comment-main">
                        <div class="avatar-container">
                            <div class="avatar-img flex items-center justify-center text-white font-black text-sm">
                                ${c.name ? c.name.charAt(0).toUpperCase() : '?'}
                            </div>
                            ${c.adminLoved ? `<div class="admin-love-badge"><i class="fas fa-heart"></i></div>` : ''}
                        </div>
                        <div class="flex-1 pr-8">
                            <div class="flex items-center justify-between">
                                <span class="font-black text-xs flex items-center ${isCommentDeveloper ? 'text-blue-400' : 'text-gray-200'}">
                                    ${c.name} ${isCommentDeveloper ? '<span class="dev-badge">Developer</span>' : ''}
                                </span>
                                <span class="text-[8px] timestamp-text font-bold uppercase tracking-tighter">${formatDate(c.timestamp)}</span>
                            </div>
                            <div class="flex mb-2">${stars}</div>
                            <p class="text-gray-300 text-[12px] leading-snug mb-3">${c.text}</p>
                            <div class="flex items-center gap-5">
                                <button onclick="handleEngagement('${c.id}', 'like')" class="eng-btn flex items-center gap-1.5 text-[10px] font-black ${userInt === 'like' ? 'text-blue-400' : 'text-gray-500'}">
                                    <i class="${userInt === 'like' ? 'fas' : 'far'} fa-thumbs-up"></i> ${c.likes || 0}
                                </button>
                                <button onclick="handleEngagement('${c.id}', 'dislike')" class="eng-btn flex items-center gap-1.5 text-[10px] font-black ${userInt === 'dislike' ? 'text-red-400' : 'text-gray-500'}">
                                    <i class="${userInt === 'dislike' ? 'fas' : 'far'} fa-thumbs-down"></i> ${c.dislikes || 0}
                                </button>
                                <button onclick="replyComment('${c.id}', '${c.name}')" class="eng-btn text-gray-400 text-[10px] font-black uppercase hover:text-white">Balas</button>
                            </div>
                        </div>
                    </div>

                    <div class="comment-menu-container">
                        <div class="dot-menu-btn" onclick="toggleCommentMenu('${c.id}')"><i class="fas fa-ellipsis-v text-xs"></i></div>
                        <div class="dropdown-menu" id="menu-${c.id}">
                            ${isMyComment ? `<div class="dropdown-item" onclick="editComment('${c.id}')"><i class="fas fa-edit"></i> Edit</div>` : ''}
                            ${isViewerAdmin ? `<div class="dropdown-item" onclick="loveComment('${c.id}')"><i class="fas fa-heart text-red-500"></i> ${c.adminLoved ? 'Unlove' : 'Love'}</div>` : ''}
                            ${(isMyComment || isViewerAdmin) ? `<div class="dropdown-item danger" onclick="deleteComment('${c.id}')"><i class="fas fa-trash-alt"></i> Hapus</div>` : ''}
                            ${isViewerAdmin ? `<div class="dropdown-item" onclick="copyMyUID()"><i class="fas fa-fingerprint"></i> Salin UID Saya</div>` : ''}
                            <div class="dropdown-item" onclick="Swal.fire({title:'Laporan', text:'Laporan terkirim ke admin', icon:'success', background:'#0d1425', color:'#fff'})"><i class="fas fa-flag"></i> Lapor</div>
                        </div>
                    </div>

                    <div class="reply-section ${relevantReps.length === 0 ? 'hidden' : ''}">
                        ${relevantReps.map(r => {
                            const isRepDeveloper = (r.uid === ADMIN_UID);
                            const isMyRep = (r.uid === USER_UID);
                            const repInt = myInteractions[r.id];
                            return `
                            <div class="reply-item flex gap-3 mb-2 relative pr-8" id="comment-${r.id}">
                                <div class="w-8 h-8 rounded-full border border-white/10 flex-shrink-0 bg-blue-900 flex items-center justify-center text-[10px] font-bold relative">
                                    ${r.name ? r.name.charAt(0).toUpperCase() : '?'}
                                    ${r.adminLoved ? `<div class="admin-love-badge" style="width:12px; height:12px; bottom:-1px; right:-1px;"><i class="fas fa-heart" style="font-size:6px;"></i></div>` : ''}
                                </div>
                                <div class="bg-white/5 p-3 rounded-2xl flex-1 border border-white/5">
                                    <div class="flex justify-between items-center mb-1">
                                        <span class="text-[10px] font-black flex items-center ${isRepDeveloper ? 'text-blue-400' : 'text-gray-400'}">
                                            ${r.name} ${isRepDeveloper ? '<span class="dev-badge" style="font-size:6px; padding:1px 4px;">Developer</span>' : ''}
                                        </span>
                                        <span class="text-[7px] timestamp-text uppercase font-bold">${formatDate(r.timestamp)}</span>
                                    </div>
                                    <p class="text-[11px] text-gray-300 mb-2">${r.text}</p>
                                    <div class="flex gap-4 items-center">
                                        <button onclick="handleEngagement('${r.id}', 'like')" class="text-[9px] font-black ${repInt === 'like' ? 'text-blue-400' : 'text-gray-500'}"><i class="fas fa-thumbs-up"></i> ${r.likes || 0}</button>
                                        <button onclick="handleEngagement('${r.id}', 'dislike')" class="text-[9px] font-black ${repInt === 'dislike' ? 'text-red-400' : 'text-gray-500'}"><i class="fas fa-thumbs-down"></i> ${r.dislikes || 0}</button>
                                        <button onclick="replyComment('${c.id}', '${r.name}')" class="text-[8px] text-gray-600 font-black uppercase">Balas</button>
                                    </div>
                                </div>
                                <div class="comment-menu-container reply-menu-pos">
                                    <div class="dot-menu-btn" onclick="toggleCommentMenu('${r.id}')" style="width:24px; height:24px;"><i class="fas fa-ellipsis-v text-[10px]"></i></div>
                                    <div class="dropdown-menu" id="menu-${r.id}">
                                        ${isMyRep ? `<div class="dropdown-item" onclick="editComment('${r.id}')"><i class="fas fa-edit"></i> Edit</div>` : ''}
                                        ${isViewerAdmin ? `<div class="dropdown-item" onclick="loveComment('${r.id}')"><i class="fas fa-heart text-red-500"></i> ${r.adminLoved ? 'Unlove' : 'Love'}</div>` : ''}
                                        ${(isMyRep || isViewerAdmin) ? `<div class="dropdown-item danger" onclick="deleteComment('${r.id}')"><i class="fas fa-trash-alt"></i> Hapus</div>` : ''}
                                        ${isViewerAdmin ? `<div class="dropdown-item" onclick="copyMyUID()"><i class="fas fa-fingerprint"></i> Salin UID Saya</div>` : ''}
                                        <div class="dropdown-item" onclick="Swal.fire({title:'Laporan', text:'Laporan terkirim ke admin', icon:'success', background:'#0d1425', color:'#fff'})"><i class="fas fa-flag"></i> Lapor</div>
                                    </div>
                                </div>
                            </div>`
                        }).join('')}
                    </div>
                </div>`;
            }).join('');
        };

        window.handleEngagement = (id, type) => {
            let myInts = JSON.parse(localStorage.getItem('my_ints_v4') || '{}');
            const updated = (siteData.comments || []).map(c => {
                if(c.id === id) {
                    if(myInts[id] === type) {
                        c[type === 'like' ? 'likes' : 'dislikes'] = Math.max(0, (c[type === 'like' ? 'likes' : 'dislikes'] || 0) - 1);
                        delete myInts[id];
                    } else {
                        if(myInts[id]) c[myInts[id] === 'like' ? 'likes' : 'dislikes'] = Math.max(0, (c[myInts[id] === 'like' ? 'likes' : 'dislikes'] || 0) - 1);
                        c[type === 'like' ? 'likes' : 'dislikes'] = (c[type === 'like' ? 'likes' : 'dislikes'] || 0) + 1;
                        myInts[id] = type;
                    }
                }
                return c;
            });
            localStorage.setItem('my_ints_v4', JSON.stringify(myInts));
            update(dbRef, { comments: updated });
            playSfx('pop');
        };

        window.loveComment = (id) => {
            const updated = (siteData.comments || []).map(c => {
                if(c.id === id) c.adminLoved = !c.adminLoved;
                return c;
            });
            update(dbRef, { comments: updated });
            playSfx('success');
        };

        window.deleteComment = (id) => {
            Swal.fire({ title: 'Hapus?', text: "Pesan Anda akan hilang selamanya.", icon: 'warning', background: '#0d1425', color: '#fff', showCancelButton: true, confirmButtonColor: '#3b82f6', confirmButtonText: 'Ya, Hapus' }).then(res => {
                if(res.isConfirmed) {
                    const updated = (siteData.comments || []).filter(c => c.id !== id && c.parentId !== id);
                    update(dbRef, { comments: updated });
                    playSfx('pop');
                }
            });
        };

        window.editComment = (id) => {
            const comment = (siteData.comments || []).find(c => c.id === id);
            if(!comment) return;
            editingId = id;
            selectedStar = comment.star || 5;
            document.getElementById('revName').value = comment.name;
            document.getElementById('revText').value = comment.text;
            updateStarsUI();
            openModal();
            document.getElementById('modalTitle').innerText = "Edit Ulasan";
        };

        window.replyComment = (parentId, name) => {
            currentParentId = parentId; 
            document.getElementById('revText').value = `@${name} `;
            openModal();
            document.getElementById('modalTitle').innerText = "Balas Ulasan";
            document.getElementById('revText').focus();
            playSfx('pop');
        };

        window.postReview = () => {
            const nameInput = document.getElementById('revName').value.trim();
            const textInput = document.getElementById('revText').value.trim();
            if(!textInput) return;
            
            const name = nameInput || "User_" + Math.floor(Math.random() * 999);
            const currentData = Array.isArray(siteData.comments) ? siteData.comments : [];
            let updated = [...currentData];
            
            if(editingId) {
                updated = updated.map(c => c.id === editingId ? {...c, text: textInput, star: selectedStar} : c);
                editingId = null;
            } else {
                const now = new Date();
                const newId = 'rev_' + now.getTime();
                const newComment = { 
                    id: newId, 
                    uid: USER_UID, 
                    parentId: currentParentId || null, 
                    name: name, 
                    text: textInput, 
                    star: currentParentId ? 5 : selectedStar, 
                    likes: 0, 
                    dislikes: 0, 
                    adminLoved: false, 
                    timestamp: now.toISOString() 
                };
                updated.push(newComment);
                localStorage.setItem('user_name_v4', name);
            }
            
            update(dbRef, { comments: updated }).then(() => { 
                closeModal(); 
                playSfx('success');
            });
        };

        window.likeScript = (index) => {
            const scriptId = `script_${index}`;
            const myScriptLikes = JSON.parse(localStorage.getItem('my_script_likes_v4') || '{}');
            let currentLikes = siteData.scriptLikes ? (siteData.scriptLikes[scriptId] || 0) : 0;
            if(myScriptLikes[scriptId]) { currentLikes = Math.max(0, currentLikes - 1); delete myScriptLikes[scriptId]; } 
            else { currentLikes += 1; myScriptLikes[scriptId] = true; }
            localStorage.setItem('my_script_likes_v4', JSON.stringify(myScriptLikes));
            const updates = {}; updates[`scriptLikes/${scriptId}`] = currentLikes;
            update(dbRef, updates);
            playSfx('pop');
        };

        function renderPopuler() {
            const container = document.getElementById('populerList');
            const data = (siteData.comments || []).filter(c => (c.likes || 0) >= 20).sort((a,b) => b.likes - a.likes).slice(0, 5);
            if(data.length > 0) {
                document.getElementById('populerContainer').classList.remove('hidden');
                container.innerHTML = data.map(c => `
                <div class="populer-card">
                    <div class="flex gap-4">
                        <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-blue-600 to-blue-400 flex items-center justify-center text-white font-black text-xl border border-white/20">${c.name ? c.name.charAt(0).toUpperCase() : '?'}</div>
                        <div class="flex-1">
                            <div class="flex justify-between items-start">
                                <div class="font-black text-sm text-white">${c.name}</div>
                                <i class="fas fa-crown text-yellow-500 text-xs animate-bounce"></i>
                            </div>
                            <div class="flex text-pink-500 text-[9px] font-black gap-1 mt-1 uppercase tracking-tighter"><i class="fas fa-heart"></i> ${c.likes} Likes</div>
                            <p class="text-[11px] text-blue-100 mt-2 line-clamp-2 leading-relaxed italic">"${c.text}"</p>
                        </div>
                    </div>
                </div>`).join('');
                updateScrollDots('populerList', 'populerDots');
            } else { document.getElementById('populerContainer').classList.add('hidden'); }
        }

        onValue(dbRef, (snap) => {
            if(snap.exists()) {
                const val = snap.val();
                if(!val.comments) val.comments = [];
                siteData = val;
            }
            renderAll();
            setTimeout(() => {
                const loader = document.getElementById('loader-wrapper');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 800);
            }, 1000);
        });

        document.querySelectorAll('#starInput span').forEach(s => {
            s.onclick = () => { selectedStar = parseInt(s.dataset.v); updateStarsUI(); playSfx('pop'); };
        });

        function updateStarsUI() {
            document.querySelectorAll('#starInput span').forEach(x => {
                x.classList.toggle('text-yellow-500', x.dataset.v <= selectedStar);
                x.classList.toggle('text-gray-800', x.dataset.v > selectedStar);
            });
        }
    </script>

    <script>
        function initUI() {
            document.getElementById('navBrand').innerText = CONFIG.title;
            document.getElementById('webSlogan').innerText = CONFIG.description;
            document.getElementById('mainAvatar').src = CONFIG.profilePic;
            document.getElementById('sidebarAvatar').src = CONFIG.profilePic;
            document.getElementById('buyPanelBtn').href = CONFIG.buyPanelLink;
            document.getElementById('customBg').style.backgroundImage = `url('${CONFIG.background}')`;
            
            const side = document.getElementById('sidebarContent');
            side.innerHTML = CONFIG.sidebarCategories.map(cat => `
                <div class="sidebar-category-header">
                    <span class="text-[10px] text-blue-400 font-black uppercase tracking-widest">${cat.categoryName}</span>
                </div>
                ${cat.links.map(l => `
                    <a href="${l.link}" onclick="playSfx('pop')" class="sidebar-item flex items-center gap-4 px-6 py-4">
                        <div class="w-8 h-8 rounded-lg bg-blue-600/10 flex items-center justify-center border border-blue-500/20">
                            <i class="${l.icon} text-blue-400 text-sm"></i>
                        </div>
                        <span class="text-xs font-black uppercase text-gray-300 tracking-wider">${l.name}</span>
                        <i class="fas fa-chevron-right ml-auto text-[8px] text-gray-600"></i>
                    </a>
                `).join('')}
            `).join('');
            
            const sBox = document.getElementById('socialBox');
            sBox.innerHTML = CONFIG.socials.map(s => `<a href="${s.link}" onclick="playSfx('pop')" class="w-11 h-11 bg-white/5 border border-white/10 rounded-2xl flex items-center justify-center text-blue-400"><i class="${s.icon} text-lg"></i></a>`).join('');
            
            renderScripts(CONFIG.items);
            renderFooter();
        }

        window.filterScripts = () => {
            const query = document.getElementById('scriptSearch').value.toLowerCase();
            const filtered = CONFIG.items.filter(it => it.title.toLowerCase().includes(query) || it.description.toLowerCase().includes(query));
            renderScripts(filtered);
        };

        function renderScripts(data) {
            const list = document.getElementById('scriptList');
            const myScriptLikes = JSON.parse(localStorage.getItem('my_script_likes_v4') || '{}');
            
            if(data.length === 0) {
                list.innerHTML = `<div class="empty-state">
                    <div class="mb-4"><i class="fas fa-ghost text-4xl text-blue-500/20 animate-bounce"></i></div>
                    <p class="text-white font-black text-sm uppercase tracking-widest">Script tidak ditemukan</p>
                </div>`;
                return;
            }

            list.innerHTML = data.map((item, idx) => {
                const sId = `script_${idx}`;
                const isLiked = myScriptLikes[sId];
                const count = siteData.scriptLikes ? (siteData.scriptLikes[sId] || 0) : 0;
                return `<div class="min-w-[280px] bg-[#111a2e] rounded-[2.5rem] overflow-hidden border border-white/5 snap-center relative">
                    <img src="${item.thumbnail}" class="w-full h-44 object-cover">
                    <div class="p-6">
                        <div class="flex justify-between items-start mb-2">
                            <h4 class="font-black text-sm text-white uppercase line-clamp-1">${item.title}</h4>
                            <button onclick="likeScript(${idx})" class="flex items-center gap-1 text-[10px] ${isLiked ? 'text-pink-500' : 'text-gray-500'}">
                                <i class="${isLiked ? 'fas' : 'far'} fa-heart"></i> ${count}
                            </button>
                        </div>
                        <p class="text-[10px] text-gray-400 mb-6 line-clamp-2">${item.description}</p>
                        <a href="${item.downloadLink}" onclick="playSfx('pop')" class="block text-center py-4 bg-blue-600 rounded-2xl text-[10px] font-black uppercase">Get Script</a>
                    </div>
                </div>`;
            }).join('');
            updateScrollDots('scriptList', 'scrollDots');
        }

        window.updateScrollDots = (cId, dId) => {
            const list = document.getElementById(cId);
            const dots = document.getElementById(dId);
            if(!list || !dots) return;
            const count = Math.ceil(list.scrollWidth / list.clientWidth);
            const active = Math.round(list.scrollLeft / list.clientWidth);
            dots.innerHTML = Array.from({length: count}).map((_, i) => `<div class="dot-item ${i === active ? 'active' : ''}"></div>`).join('');
        }

        async function startTerminalAnimation() {
            const table = document.getElementById('terminalLines');
            const logs = [
                { t: "system.init()", c: "text-blue-400" },
                { t: "fetching_database_v4... [OK]", c: "text-green-400" },
                { t: "syncing_user_profile...", c: "text-purple-400" },
                { t: "verifying_developer_id...", c: "text-yellow-400" },
                { t: "root@shell: automation_active", c: "text-blue-300" },
                { t: ">> system_rendering_complete", c: "text-pink-400" }
            ];
            let line = 1;
            while(true) {
                table.innerHTML = ''; line = 1;
                for(let log of logs) {
                    const tr = document.createElement('tr'); tr.className = 'term-row';
                    tr.innerHTML = `<td class="term-num">${line++}</td><td class="term-code ${log.c}"><span class="txt"></span></td>`;
                    table.appendChild(tr);
                    const span = tr.querySelector('.txt');
                    for(let char of log.t) { span.innerHTML += char; await new Promise(r => setTimeout(r, 30)); }
                    await new Promise(r => setTimeout(r, 1000));
                }
                await new Promise(r => setTimeout(r, 4000));
            }
        }

        function initTypingTitle() {
            const el = document.getElementById('webTitle');
            const words = CONFIG.typingWords;
            let wIdx = 0, cIdx = 0, isDel = false;
            function type() {
                const cur = words[wIdx];
                const txt = isDel ? cur.substring(0, cIdx--) : cur.substring(0, cIdx++);
                el.innerHTML = txt === "" ? "&nbsp;" : txt;
                if(!isDel && cIdx > cur.length) { isDel = true; setTimeout(type, 2000); }
                else if(isDel && cIdx < 0) { isDel = false; wIdx = (wIdx+1)%words.length; setTimeout(type, 500); }
                else setTimeout(type, isDel ? 60 : 120);
            }
            type();
        }

        function renderFooter() {
            const foot = document.getElementById('mainFooter');
            foot.innerHTML = `<div class="px-8 max-w-lg mx-auto">
                <div class="text-center mb-10">
                    <div class="pixel-font text-sm text-blue-500 mb-4">${CONFIG.title}</div>
                    <p class="text-gray-500 text-[11px]">${CONFIG.footer.description}</p>
                </div>
                <div class="grid grid-cols-2 gap-8 mb-10 border-y border-white/5 py-10">
                    <div>
                        <h4 class="text-[10px] font-black text-white uppercase mb-4 tracking-widest">PAGES</h4>
                        <div class="flex flex-col gap-3">
                            <button onclick="openFooterPage('tos'); playSfx('pop')" class="text-left text-[11px] text-gray-500 font-bold uppercase">TOS</button>
                            <button onclick="openFooterPage('privacy'); playSfx('pop')" class="text-left text-[11px] text-gray-500 font-bold uppercase">Privacy</button>
                            <button onclick="openFooterPage('about'); playSfx('pop')" class="text-left text-[11px] text-gray-500 font-bold uppercase">About</button>
                        </div>
                    </div>
                    <div>
                        <h4 class="text-[10px] font-black text-white uppercase mb-4 tracking-widest">FOLLOW</h4>
                        <div class="flex flex-wrap gap-2">
                            ${CONFIG.socials.map(s => `<a href="${s.link}" onclick="playSfx('pop')" class="w-9 h-9 bg-white/5 rounded-xl flex items-center justify-center text-sm text-blue-400"><i class="${s.icon}"></i></a>`).join('')}
                        </div>
                    </div>
                </div>
                <div class="text-center text-[9px] text-gray-600 font-black uppercase tracking-[0.3em]">${CONFIG.footer.copyright}</div>
            </div>`;
        }

        window.openFooterPage = (key) => { const m = document.getElementById('footerPageModal'); document.getElementById('fPageTitle').innerText = CONFIG.footerPages[key].title; document.getElementById('fPageContent').innerHTML = CONFIG.footerPages[key].content; m.classList.add('active'); };
        window.closeFooterModal = () => { document.getElementById('footerPageModal').classList.remove('active'); };
        window.toggleMenu = () => { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); };
        window.openModal = () => { document.getElementById('revModal').classList.remove('hidden'); const savedName = localStorage.getItem('user_name_v4'); if(savedName) document.getElementById('revName').value = savedName; document.getElementById('modalTitle').innerText = "Kirim Ulasan"; };
        window.closeModal = () => { document.getElementById('revModal').classList.add('hidden'); editingId = null; currentParentId = null; document.getElementById('revText').value = ""; };

        window.onload = () => {
            initUI();
            initTypingTitle();
            startTerminalAnimation();
            const bar = document.getElementById('loader-bar-fill');
            let p = 0;
            const intv = setInterval(() => { p += 10; bar.style.width = p+'%'; if(p>=100) clearInterval(intv); }, 80);
        };
    </script>
</body>
</html>

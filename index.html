<!DOCTYPE html>

        <div class="absolute top-6 right-6 text-white text-3xl cursor-pointer hover:text-blue-400 transition-colors drop-shadow-lg">

        </div>
    </div>

    <div id="loader-wrapper">

    <div class="app-container">

                    <div id="navBrand" class="text-blue-400 text-[11px] font-black uppercase tracking-widest">LOADING...</div>

                    <div class="relative">

                        <div class="terminal-body" id="terminalContent">

            <div class="mt-16 px-6">
                <h2 class="pixel-font text-[10px] text-blue-400 section-header uppercase mb-6">Latest Free Scripts</h2>

                    <input type="text" id="scriptSearch"

                           placeholder="Search script..."

        <div class="bg-[#0d1425] w-full max-sm rounded-[2.5rem] p-8 border border-blue-500/30 shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-600 to-purple-600"></div>

            <div id="profilePreviewContainer">
                <img id="profilePreviewImg" src="" alt="Profile Preview">
                <div id="removeProfilePreviewBtn" onclick="clearProfileSelection()"><i class="fas fa-times"></i></div>

                <img id="imagePreviewImg" src="" alt="Image Preview">
                <div id="removePreviewBtn" onclick="clearImageSelection()"><i class="fas fa-times"></i></div>

            <div class="upload-btn-wrapper">

                    Batal

                <button id="submitReviewBtn" onclick="postReview()" class="flex-1 bg-blue-600 rounded-xl py-4 font-black text-white uppercase text-[10px] shadow-lg shadow-blue-600/30 hover:bg-blue-500 transition-colors active:scale-95 btn-3d">
                    Kirim

            </div>

    </div>

    <script type="module" src="awang1.js"></script>
    <script type="module" src="awang2.js"></script>
    <script type="module" src="script_home.js"></script>
